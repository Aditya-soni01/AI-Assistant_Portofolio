<!DOCTYPE html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ─── Primary Meta Tags ──────────────────────────────────────────────── -->
    <title>Your Name | Developer Portfolio</title>
    <meta name="title" content="Your Name | Developer Portfolio" />
    <meta
      name="description"
      content="Full-stack developer specializing in modern web applications. Explore my projects, skills, and experience."
    />
    <meta name="author" content="Your Name" />
    <meta
      name="keywords"
      content="developer, portfolio, full-stack, react, javascript, typescript, web development, software engineer"
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#06b6d4" />

    <!-- ─── Open Graph / Facebook ─────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourportfolio.dev/" />
    <meta property="og:title" content="Your Name | Developer Portfolio" />
    <meta
      property="og:description"
      content="Full-stack developer specializing in modern web applications. Explore my projects, skills, and experience."
    />
    <meta
      property="og:image"
      content="https://yourportfolio.dev/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Your Name — Developer Portfolio" />
    <meta property="og:site_name" content="Your Name | Developer Portfolio" />
    <meta property="og:locale" content="en_US" />

    <!-- ─── Twitter Card ───────────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://yourportfolio.dev/" />
    <meta name="twitter:title" content="Your Name | Developer Portfolio" />
    <meta
      name="twitter:description"
      content="Full-stack developer specializing in modern web applications. Explore my projects, skills, and experience."
    />
    <meta
      name="twitter:image"
      content="https://yourportfolio.dev/og-image.png"
    />
    <meta name="twitter:image:alt" content="Your Name — Developer Portfolio" />
    <meta name="twitter:creator" content="@yourhandle" />
    <meta name="twitter:site" content="@yourhandle" />

    <!-- ─── Canonical URL ──────────────────────────────────────────────────── -->
    <link rel="canonical" href="https://yourportfolio.dev/" />

    <!-- ─── Favicons ───────────────────────────────────────────────────────── -->
    <!--
      Place the following files in the /public directory:
        /public/favicon.ico          — legacy browsers (32×32)
        /public/favicon.svg          — modern browsers (scalable)
        /public/favicon-16x16.png    — 16×16 PNG
        /public/favicon-32x32.png    — 32×32 PNG
        /public/apple-touch-icon.png — iOS home screen (180×180)
        /public/android-chrome-192x192.png
        /public/android-chrome-512x512.png
        /public/site.webmanifest
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="msapplication-TileColor" content="#06b6d4" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- ─── DNS Prefetch / Preconnect ─────────────────────────────────────── -->
    <!--
      Establish early connections to origins we will definitely fetch from,
      reducing perceived latency for fonts and analytics scripts.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ─── Google Fonts ──────────────────────────────────────────────────── -->
    <!--
      Inter        — primary UI / body font
      Plus Jakarta Sans — display / heading accent font
      Fira Code    — monospace font for code snippets & typing animation

      The display=swap parameter ensures text remains visible during font load.
      Subset to latin to keep the payload small for a portfolio that targets
      English-speaking audiences; extend if needed.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fira+Code:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- ─── Inline Dark Mode Bootstrap ───────────────────────────────────── -->
    <!--
      Apply the user's saved theme preference BEFORE React hydrates to prevent
      a flash of the wrong theme (FOUT).  This tiny inline script runs
      synchronously in <head>, guaranteeing the correct "dark" / "" class is
      present on <html> before any paint occurs.

      It intentionally uses vanilla JS and avoids any module syntax so it
      executes in all browsers without a script loader.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;

          if (stored === "dark" || (!stored && prefersDark)) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (e) {
          // localStorage may be unavailable in private-browsing or restricted
          // contexts — fail silently and default to the light theme.
        }
      })();
    </script>

    <!-- ─── Structured Data (JSON-LD) ─────────────────────────────────────── -->
    <!--
      Person schema improves how search engines present the portfolio in
      knowledge panels and rich results.  Update the fields below to match
      your real information before deploying.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Your Name",
        "url": "https://yourportfolio.dev",
        "image": "https://yourportfolio.dev/og-image.png",
        "jobTitle": "Full-Stack Developer",
        "description": "Full-stack developer specializing in modern web applications.",
        "sameAs": [
          "https://github.com/yourusername",
          "https://linkedin.com/in/yourusername",
          "https://twitter.com/yourhandle"
        ],
        "knowsAbout": [
          "JavaScript",
          "TypeScript",
          "React",
          "Node.js",
          "Web Development",
          "Software Engineering"
        ]
      }
    </script>
  </head>

  <body>
    <!-- ─── React Mount Point ────────────────────────────────────────────── -->
    <!--
      Vite injects the compiled React bundle here at build time.
      The noscript fallback is shown to users with JavaScript disabled.
    -->
    <div id="root"></div>

    <noscript>
      <div
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          font-family: Inter, system-ui, sans-serif;
          font-size: 1rem;
          color: #334155;
          text-align: center;
          padding: 2rem;
          background: #f9fafb;
        "
      >
        <p>
          This portfolio requires JavaScript to run. Please enable JavaScript
          in your browser settings and reload the page.
        </p>
      </div>
    </noscript>

    <!-- ─── App Entry Point ───────────────────────────────────────────────── -->
    <!--
      Vite resolves this module-type script tag during development (HMR) and
      replaces it with the hashed bundle path at build time.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
